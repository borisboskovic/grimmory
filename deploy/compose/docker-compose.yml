services:
  # Upgrade path from Booklore:
  # Keep your existing service name, container_name, database names/users, ports,
  # and mounted volumes. Replace only the image line(s) with Grimmory tags.
  grimmory:
    build: ../../
    container_name: grimmory
    env_file:
      - ../../.env.grimmory
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "6060:6060"
    volumes:
      - ./data:/app/data
      - ./books:/books
      - ./bookdrop:/bookdrop
    healthcheck:
      test: wget -q -O - http://localhost:6060/api/v1/healthcheck
      interval: 60s
      retries: 5
      start_period: 60s
      timeout: 10s
    restart: unless-stopped

  mariadb:
    image: lscr.io/linuxserver/mariadb:11.4.8
    container_name: mariadb
    env_file:
      - ../../.env.mariadb
    volumes:
      - ./config:/config
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
